rubric:
  name: Refine readiness
  version: 2
  threshold: 7
  maxScore: 12
  criteria:
    - id: summary-specific
      label: Specific, unambiguous summary
      points: 1
      passWhen: >
        Names the concrete failure or change. Reject vague summaries like
        `Fix bug`, `Improve X`, `Refactor Y`.
    - id: description-rationale
      label: Description with context and rationale
      points: 1
      passWhen: >
        Current state, desired outcome, and why the work matters now are all
        present.
    - id: ac-present
      label: Explicit acceptance criteria present
      points: 2
      passWhen: >
        A visible `Acceptance Criteria`, `AC`, `Given/When/Then`, or
        `Definition of Done` section exists.
    - id: ac-testable
      label: Acceptance criteria are testable
      points: 1
      passWhen: >
        Each criterion has a measurable outcome a tester can verify
        independently. Reject `it should work`, `improve performance` without
        a target, `make it better`.
    - id: component-identified
      label: Component or code area identified
      points: 1
      passWhen: >
        At least one Jira component is set, and the relevant service / code
        area is named in the description.
    - id: scope-bounded
      label: Scope is bounded
      points: 1
      passWhen: >
        One bounded change, not an open-ended cleanup. Push back if the user
        wrote `refactor the entire service`.
    - id: no-blockers
      label: No unresolved blockers at time of work
      points: 1
      passWhen: >
        No open dependency is still blocking implementation at the time the
        ticket would be picked up.
    - id: architecture-drawn
      label: Architecture diagram
      points: 1
      passWhen: >
        A diagram (mermaid, ASCII, or image) shows the major components and
        their connections. All components named in the ticket are represented.
        Soft criterion — skip with a reason for trivial changes.
    - id: interfaces-defined
      label: Interfaces defined
      points: 1
      passWhen: >
        Public interfaces for each component are enumerated — function
        signatures, type exports, message schemas, API routes, event shapes.
        Soft criterion — skip with a reason for pure internal refactors.
    - id: state-transitions
      label: State transitions specified
      points: 1
      passWhen: >
        For each stateful component, states are enumerated, events are
        listed, and transitions between states are specified. Soft criterion
        — skip with a reason for stateless transformations.
    - id: invariants-specified
      label: Invariants specified
      points: 1
      passWhen: >
        At least one explicit invariant is stated — a pre/post condition,
        business rule, data constraint, or concurrency guard. Soft criterion
        — skip with a reason for trivial tickets.
